<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PageCustomizeUI - CakeFromZer0</title>
  <link rel="stylesheet" href="../CSS/bootstrap.css" />
  <style>
    :root {
      --bg: var(--bs-body-bg, #f8f9fa);
      --text: var(--bs-body-color, #212529);
      --nav: var(--bs-dark, #212529);
      --accent: var(--bs-primary, #0d6efd);
      --card: var(--bs-white, #fff);
      --shadow: var(--bs-box-shadow-sm, 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075));
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: var(--bs-font-sans-serif);
      background: radial-gradient(circle at top center, rgba(13, 110, 253, 0.08) 0%, transparent 40%),
        radial-gradient(circle at bottom right, rgba(13, 110, 253, 0.05) 0%, transparent 25%),
        var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--bs-gray-200);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent);
    }

    .menu-icon {
      width: 48px;
      height: 48px;
      border: 1px solid var(--bs-gray-300);
      border-radius: 1rem;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      background: var(--bs-white);
      box-shadow: var(--shadow);
    }

    .menu-icon:hover {
      transform: translateY(-2px);
      background: var(--bs-light);
    }

    .menu-icon span,
    .menu-icon span::before,
    .menu-icon span::after {
      display: block;
      width: 22px;
      height: 2px;
      border-radius: 999px;
      background: var(--nav);
      position: relative;
    }

    .menu-icon span::before,
    .menu-icon span::after {
      content: "";
      position: absolute;
      left: 0;
    }

    .menu-icon span::before {
      top: -7px;
    }

    .menu-icon span::after {
      bottom: -7px;
    }

    .menu-panel {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 30;
    }

    .menu-overlay {
      position: absolute;
      inset: 0;
      background: rgba(16, 12, 8, 0.35);
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .menu-content {
      position: relative;
      width: min(320px, 90%);
      padding: 2rem 1.5rem;
      border-radius: 1.5rem;
      background: var(--bs-white);
      border: 1px solid var(--bs-gray-200);
      box-shadow: var(--bs-box-shadow);
      transform: translateY(-24px) scale(0.95);
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: auto;
      backdrop-filter: blur(12px);
    }

    .menu-content h2 {
      margin: 0 0 1rem;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      color: var(--bs-heading-color);
    }

    .menu-link {
      display: block;
      padding: 0.85rem 0;
      color: var(--bs-dark);
      text-decoration: none;
      font-size: 1rem;
      border-bottom: 1px solid var(--bs-gray-200);
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .menu-link:last-child {
      border-bottom: none;
    }

    .menu-link:hover {
      color: var(--accent);
      transform: translateX(4px);
    }

    .menu-open .menu-overlay {
      opacity: 1;
      pointer-events: auto;
    }

    .menu-open .menu-content {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .menu-open .menu-icon span {
      transform: rotate(45deg);
    }

    .menu-open .menu-icon span::before {
      transform: rotate(90deg);
      top: 0;
    }

    .menu-open .menu-icon span::after {
      opacity: 0;
    }

    .hero {
      display: grid;
      gap: 40px;
      align-items: center;
      justify-items: center;
      padding-bottom: 56px;
    }

    .hero-grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .cake-card {
      width: clamp(100px, 15%, 160px);
      height: 120px;
      border-radius: 1.5rem;
      background: var(--card);
      border: 1px solid var(--bs-gray-200);
      box-shadow: var(--bs-box-shadow-sm);
      display: grid;
      place-items: center;
      font-size: 0.95rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      padding: 1rem;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .cake-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--bs-box-shadow);
    }

    .cake-card span {
      color: var(--bs-dark);
      font-weight: 600;
    }

    .cta {
      width: min(560px, 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 18px 26px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 0.75rem 1.5rem rgba(13, 110, 253, 0.18);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .cta:hover {
      transform: translateX(6px);
      box-shadow: 0 1rem 1.75rem rgba(13, 110, 253, 0.22);
      background: rgb(10, 98, 226);
    }

    .cta svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
      transition: transform 0.2s ease;
    }

    .cta:hover svg {
      transform: translateX(4px);
    }

    .hero-grid.bottom {
      margin-top: 16px;
    }

    @keyframes float-left {
      0%, 100% {
        transform: translateX(-6px);
      }
      50% {
        transform: translateX(0);
      }
    }

    @keyframes float-right {
      0%, 100% {
        transform: translateX(6px);
      }
      50% {
        transform: translateX(0);
      }
    }

    .cake-card.animate-left {
      animation: float-left 3.5s ease-in-out infinite;
    }

    .cake-card.animate-right {
      animation: float-right 3.5s ease-in-out infinite;
    }

    @media (max-width: 900px) {
      .header {
        justify-content: space-between;
      }

      .cake-card {
        width: 130px;
      }
    }

    @media (max-width: 560px) {
      .container {
        padding: 20px 12px;
      }

      .hero-grid {
        gap: 14px;
      }

      .cake-card {
        width: 110px;
        height: 110px;
      }

      .cta {
        width: 100%;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">CakeFromZer0</div>
      <button class="menu-icon" id="menuToggle" aria-label="ハンバーガーメニュー" aria-expanded="false" aria-controls="pageMenu">
        <span aria-hidden="true"></span>
      </button>
    </header>

    <div class="menu-panel" id="pageMenu" aria-hidden="true">
      <div class="menu-overlay" id="menuOverlay"></div>
      <div class="menu-content" role="menu" aria-label="サイトメニュー">
        <h2>メニュー</h2>
        <a class="menu-link" href="#customize" role="menuitem">ケーキのカスタマイズ</a>
        <a class="menu-link" href="#examples" role="menuitem">カスタマイズ例を見る</a>
        <a class="menu-link" href="#store" role="menuitem">店舗情報</a>
        <a class="menu-link" href="#login" role="menuitem">ログイン</a>
      </div>
    </div>

    <main class="hero">
      <section class="hero-grid top">
        <div class="cake-card animate-left"><span>くまケーキ</span></div>
        <div class="cake-card"><span>おいしそうなケーキ</span></div>
        <div class="cake-card"><span>おいしそうなケーキ</span></div>
        <div class="cake-card"><span>いちごケーキ</span></div>
      </section>

      <a href="#customize" class="cta">ケーキのカスタマイズをする
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8.5 6.5l5 5-5 5V6.5z" />
        </svg>
      </a>

      <section class="hero-grid bottom">
        <div class="cake-card"><span>おいしそうなケーキ</span></div>
        <div class="cake-card animate-right"><span>おいしそうなケーキ</span></div>
        <div class="cake-card"><span>チョコケーキ</span></div>
        <div class="cake-card"><span>いちごケーキ</span></div>
      </section>
    </main>
  </div>
  <script>
    const rootElement = document.documentElement;
    const menuToggle = document.getElementById('menuToggle');
    const menuPanel = document.getElementById('pageMenu');
    const menuOverlay = document.getElementById('menuOverlay');

    function toggleMenu() {
      const isOpen = rootElement.classList.toggle('menu-open');
      menuToggle.setAttribute('aria-expanded', String(isOpen));
      menuPanel.setAttribute('aria-hidden', String(!isOpen));
    }

    menuToggle.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && rootElement.classList.contains('menu-open')) {
        toggleMenu();
      }
    });
  </script>
</body>
</html>
